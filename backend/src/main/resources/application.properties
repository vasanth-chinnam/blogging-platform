server.port=8080

# PostgreSQL Database
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Gemini AI Configuration
app.gemini.api-key=${GEMINI_API_KEY}

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173,https://blogging-platform-beta-eight.vercel.app

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.blogplatform=DEBUG
logging.level.org.springframework.security=WARN
